<!-- Decorative background elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-secondary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-secondary-container/10 blur-[150px]"></div>
</div>
<!-- Error Banner -->
<div class="fixed top-margin-mobile md:top-margin-desktop left-1/2 transform -translate-x-1/2 z-50 w-full max-w-md px-margin-mobile">
<div class="bg-error-container/20 border border-error/50 rounded-lg p-4 flex items-center gap-3 backdrop-blur-md shadow-[0_0_20px_rgba(255,180,171,0.2)]">

<span class="font-body-md text-error">Invalid credentials</span>
<button class="ml-auto text-error/70 hover:text-error transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
<div class="w-full max-w-[400px] z-10 flex flex-col items-center space-y-8">
<!-- Header -->
<div class="text-center flex flex-col items-center">
<img alt="Aura Fitness Logo" class="w-32 h-32 object-contain mb-4 filter drop-shadow-[0_0_15px_rgba(221,183,255,0.6)]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0fbO5vCh0sxHopOzFzYIWrCitYtfn2Apwlt_XQo_jpwNb4X8Bs4o2sVgYkVUct6ZZLfn4pTyc7FcgYCqBKAcnu-aiXr-XokqpU_TPTcqk829tWwneBZBqChAJ_orpLiD3lxuPph8Y2z9Zu9td-x0jmpg4jUvV2Kej25jMsN6Hlxm_XBBU8S11L2Kf5A5-4NBodLiTBgSelI0oWXIwdhZ8CZbfblnMNAKZhcPdYmNaICsB1lqIxPpPK2GWGNylliNs1sIFimgGqA">

<p class="font-data-label text-outline uppercase tracking-widest text-xs">Smart Biomechanical Coach</p>
</div>
<!-- Glassmorphism Card -->
<div class="glass-panel w-full rounded-2xl p-6 md:p-8 space-y-6 relative">
<!-- Tabs -->
<div class="flex p-1 bg-surface-container-low rounded-lg border border-white/5">
<button class="flex-1 py-2 text-center rounded-md bg-surface-variant text-on-surface font-data-label text-sm shadow-sm transition-all text-secondary">
                    Sign In
                </button>
<button class="flex-1 py-2 text-center rounded-md text-outline hover:text-on-surface transition-all font-data-label text-sm">
                    Create Account
                </button>
</div>
<!-- Form -->
<form class="space-y-4">
<div class="space-y-1">
<label class="font-data-label text-xs text-outline-variant uppercase pl-1 block">username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors text-[20px]">mail</span>
<input class="w-full bg-primary-container border border-surface-bright rounded-lg py-3 pl-10 pr-4 text-on-surface font-body-md focus:border-secondary focus:ring-1 focus:ring-secondary/50 focus:outline-none transition-all placeholder-outline/50" placeholder="pilot@aura.fit" type="email">
</div>
</div>
<div class="space-y-1">
<label class="font-data-label text-xs text-outline-variant uppercase pl-1 block">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors text-[20px]">lock</span>
<input class="w-full bg-primary-container border border-surface-bright rounded-lg py-3 pl-10 pr-10 text-on-surface font-body-md focus:border-secondary focus:ring-1 focus:ring-secondary/50 focus:outline-none transition-all placeholder-outline/50" placeholder="••••••••" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-secondary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end pt-1">
<a class="font-data-label text-xs text-secondary hover:text-secondary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="pt-4 space-y-4">
<button class="w-full accent-gradient text-primary-container font-headline-md text-[16px] py-3 rounded-lg neon-glow-primary hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
                        Initialize Session
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="w-full bg-transparent border border-secondary/30 text-secondary font-data-label text-sm py-3 rounded-lg hover:bg-secondary/10 active:scale-[0.98] transition-all" type="button">
                        Continue as Guest
                    </button>
</div>

</div>
